<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oito Speak - English Practice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1e1e2f;
            color: white;
            padding: 20px;
            margin: 0;
        }
        h1 { margin-top: 20px; color: #4facfe; }
        
        #recordBtn {
            margin-top: 40px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }
        #recordBtn:active { transform: scale(0.95); background: #ff416c; }
        #recordBtn.recording { background: #ff416c; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 65, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0); }
        }

        #status { margin-top: 20px; font-size: 16px; color: #aaa; height: 20px;}
        
        #chat {
            margin: 40px auto;
            max-width: 500px;
            text-align: left;
            background: #2a2a40;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 85%; }
        .user-msg { background: #4facfe; align-self: flex-end; color: white; border-bottom-right-radius: 0; }
        .teacher-msg { background: #3d3d5c; align-self: flex-start; color: white; border-bottom-left-radius: 0; }
    </style>
</head>
<body>

    <h1>Oito Speak 🇺🇸</h1>
    <p>Aperte e segure o botão para falar com seu Teacher</p>

    <button id="recordBtn">Segure e Fale</button>
    <div id="status">Aguardando...</div>

    <div id="chat">
        <div class="msg teacher-msg">Hi there! How are you doing today? Hold the button to reply!</div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const chat = document.getElementById('chat');

        // Pede permissão para usar o microfone
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                // Quando soltar o botão, envia o áudio
                mediaRecorder.onstop = async () => {
                    status.innerText = "Enviando e pensando...";
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];

                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'voice.webm');

                    try {
                        const response = await fetch('/speak', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();

                        // Coloca os textos na tela
                        chat.innerHTML += `<div class="msg user-msg">${data.user_text}</div>`;
                        chat.innerHTML += `<div class="msg teacher-msg">${data.teacher_response}</div>`;
                        chat.scrollTop = chat.scrollHeight; // Rola pro fim

                        status.innerText = "Aguardando...";

                        // O Navegador lê a resposta em voz alta!
                        speakText(data.teacher_response);

                    } catch (error) {
                        console.error(error);
                        status.innerText = "Erro ao conectar.";
                    }
                };
            }).catch(err => {
                status.innerText = "Por favor, libere o acesso ao microfone.";
            });

        // Eventos para Computador (Mouse) e Celular (Touch)
        const startRecording = (e) => {
            e.preventDefault(); // Evita dar zoom no celular
            if (mediaRecorder && mediaRecorder.state === "inactive") {
                audioChunks = [];
                mediaRecorder.start();
                recordBtn.classList.add("recording");
                recordBtn.innerText = "Ouvindo...";
                status.innerText = "Gravando...";
            }
        };

        const stopRecording = (e) => {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.classList.remove("recording");
                recordBtn.innerText = "Segure e Fale";
            }
        };

        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);
        
        recordBtn.addEventListener('touchstart', startRecording, {passive: false});
        recordBtn.addEventListener('touchend', stopRecording);

        // A "Boca" - Função que faz o navegador falar usando a voz nativa do sistema
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // Força o sotaque americano
            utterance.rate = 0.95; // Uma velocidade amigável para aprendizado
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
