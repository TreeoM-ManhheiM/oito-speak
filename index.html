<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oito ENEM - Assistente de Estudos</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #12121a;
            color: white;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header / Topo */
        header {
            background-color: #1e1e2f;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }
        h1 { margin: 0; color: #4facfe; font-size: 22px; }
        .clear-btn {
            background: #ff416c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        /* Barra de Configurações (Novo!) */
        #settings-bar {
            background-color: #2a2a40;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid #3d3d5c;
            gap: 10px;
            flex-wrap: wrap;
        }
        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 140px;
        }
        select, input[type="range"] {
            background: #1e1e2f;
            color: white;
            border: 1px solid #4facfe;
            border-radius: 5px;
            padding: 4px;
            font-size: 13px;
            width: 100%;
        }
        input[type="range"] {
            border: none;
            padding: 0;
        }

        /* Área do Chat */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        
        .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.teacher { align-self: flex-start; align-items: flex-start; }

        .msg {
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            word-wrap: break-word;
        }
        .user .msg { 
            background: #4facfe; 
            color: white; 
            border-bottom-right-radius: 2px; 
        }
        .teacher .msg { 
            background: #2a2a40; 
            color: #e0e0e0; 
            border-bottom-left-radius: 2px; 
            border: 1px solid #3d3d5c;
        }
        
        .label { font-size: 12px; color: #888; margin-bottom: 4px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Controles Base (Microfone) */
        #controls {
            padding: 15px 20px 30px 20px;
            background-color: #1e1e2f;
            border-top: 1px solid #2a2a40;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #recordBtn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #recordBtn:active { transform: scale(0.95); }
        #recordBtn.recording { 
            background: linear-gradient(135deg, #ff416c, #ff4b2b); 
            animation: pulse 1.5s infinite; 
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 65, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0); }
        }

        #status { font-size: 14px; color: #aaa; min-height: 20px; font-weight: bold;}
        
        /* Indicador de quando a IA está falando */
        .speaking-indicator {
            display: none;
            color: #00f2fe;
            font-size: 13px;
            font-style: italic;
            margin-top: 5px;
        }
        .is-speaking .speaking-indicator { display: block; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <header>
        <h1>Oito ENEM 📚</h1>
        <button class="clear-btn" onclick="clearChat()">Nova Pergunta</button>
    </header>

    <div id="settings-bar">
        <div class="setting-item">
            <label for="voiceSelect">Voz:</label>
            <select id="voiceSelect">
                <option value="">Carregando...</option>
            </select>
        </div>
        <div class="setting-item">
            <label for="rateControl" style="white-space: nowrap;">Velocidade: <span id="rateValue" style="color: #4facfe; font-weight: bold;">1.0x</span></label>
            <input type="range" id="rateControl" min="0.5" max="2.0" value="1.0" step="0.1">
        </div>
    </div>

    <div id="chat-container">
        <div class="msg-wrapper teacher">
            <span class="label">👩‍🏫 Professora IA</span>
            <div class="msg">Olá! Sou sua assistente de estudos para o ENEM. Sobre qual assunto ou matéria você tem dúvidas hoje? Segure o microfone e pergunte!</div>
        </div>
    </div>

    <div id="controls">
        <div id="status">Aguardando...</div>
        <button id="recordBtn">🎤</button>
        <p style="margin: 5px 0 0 0; font-size: 12px; color: #888;">Segure para falar</p>
        <div class="speaking-indicator" id="speakingIndicator">Professora está falando... 🔊</div>
    </div>

    <script>
        // === CONTROLES DE VOZ E VELOCIDADE ===
        let ptVoices = [];
        const voiceSelect = document.getElementById('voiceSelect');
        const rateControl = document.getElementById('rateControl');
        const rateValue = document.getElementById('rateValue');

        // Carrega as vozes do dispositivo
        function populateVoiceList() {
            const allVoices = window.speechSynthesis.getVoices();
            // Filtra apenas as vozes em Português
            ptVoices = allVoices.filter(v => v.lang.includes('pt'));
            
            voiceSelect.innerHTML = '';
            
            if (ptVoices.length === 0) {
                const option = document.createElement('option');
                option.textContent = "Voz padrão do sistema";
                voiceSelect.appendChild(option);
                return;
            }

            ptVoices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.textContent = voice.name;
                option.value = index;
                
                // Tenta selecionar automaticamente uma voz feminina conhecida
                const nameUpper = voice.name.toUpperCase();
                if (nameUpper.includes('FRANCISCA') || nameUpper.includes('LUCIA') || nameUpper.includes('VITÓRIA') || nameUpper.includes('GOOGLE PT-BR')) {
                    option.selected = true;
                }
                
                voiceSelect.appendChild(option);
            });
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // Atualiza o texto da velocidade quando o aluno mexe no slider
        rateControl.addEventListener('input', () => {
            rateValue.textContent = parseFloat(rateControl.value).toFixed(1) + 'x';
        });

        // === LÓGICA DE ÁUDIO E CHAT ===
        let mediaRecorder;
        let audioChunks = [];
        let iosAudioUnlocked = false;
        
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const chatContainer = document.getElementById('chat-container');
        const controls = document.getElementById('controls');

        function clearChat() {
            chatContainer.innerHTML = `
                <div class="msg-wrapper teacher">
                    <span class="label">👩‍🏫 Professora IA</span>
                    <div class="msg">Vamos começar de novo! Qual sua dúvida para o ENEM agora?</div>
                </div>
            `;
            window.speechSynthesis.cancel();
            controls.classList.remove('is-speaking');
        }

        function addMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${sender}`;
            
            const label = document.createElement('span');
            label.className = 'label';
            label.innerText = sender === 'user' ? '👤 Você' : '👩‍🏫 Professora IA';
            
            const msg = document.createElement('div');
            msg.className = 'msg';
            msg.innerText = text;
            
            wrapper.appendChild(label);
            wrapper.appendChild(msg);
            chatContainer.appendChild(wrapper);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    status.innerText = "Pensando... 🤔";
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];

                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'voice.webm');

                    try {
                        const response = await fetch('/speak', {
                            method: 'POST',
                            body: formData
                        });
                        
                        if (!response.ok) throw new Error("Erro no servidor");
                        
                        const data = await response.json();

                        addMessage(data.user_text, 'user');
                        addMessage(data.teacher_response, 'teacher');

                        status.innerText = "Aguardando...";
                        
                        // Envia para a função falar
                        speakText(data.teacher_response);

                    } catch (error) {
                        console.error(error);
                        status.innerText = "Erro ao conectar.";
                    }
                };
            }).catch(err => {
                status.innerText = "⚠️ Libere o microfone no navegador.";
            });

        const startRecording = (e) => {
            e.preventDefault(); 
            
            if (!iosAudioUnlocked) {
                const unlockMsg = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(unlockMsg);
                iosAudioUnlocked = true;
            }
            
            window.speechSynthesis.cancel();
            controls.classList.remove('is-speaking');

            if (mediaRecorder && mediaRecorder.state === "inactive") {
                audioChunks = [];
                mediaRecorder.start();
                recordBtn.classList.add("recording");
                status.innerText = "Ouvindo... 🔴";
            }
        };

        const stopRecording = (e) => {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.classList.remove("recording");
                status.innerText = "Enviando... 🚀";
            }
        };

        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);
        
        recordBtn.addEventListener('touchstart', startRecording, {passive: false});
        recordBtn.addEventListener('touchend', stopRecording);

        // === FUNÇÃO DE FALA (MODIFICADA) ===
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Aplica a velocidade selecionada no slider
            utterance.rate = parseFloat(rateControl.value);
            
            // Aplica a voz selecionada na caixa de seleção
            const selectedVoiceIndex = voiceSelect.value;
            if (ptVoices.length > 0 && selectedVoiceIndex !== "") {
                utterance.voice = ptVoices[selectedVoiceIndex];
            } else {
                utterance.lang = 'pt-BR'; // Fallback de segurança
            }
            
            utterance.onstart = () => controls.classList.add('is-speaking');
            utterance.onend = () => controls.classList.remove('is-speaking');
            utterance.onerror = () => controls.classList.remove('is-speaking');

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
